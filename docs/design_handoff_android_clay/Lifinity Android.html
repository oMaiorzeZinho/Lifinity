<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lifinity — Android (Claymorphism)</title>
<link rel="stylesheet" href="clay.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(80% 50% at 50% 0%, #20342780, transparent 70%),
      linear-gradient(160deg, #0e1812, #13201700 40%), #0c140f;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-family: 'Nunito', system-ui, sans-serif;
  }
  #fit { transform-origin: center center; }
  #app-root { filter: drop-shadow(0 40px 90px rgba(0,0,0,0.55)); }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="22" fill="#1e2d22"/>
      <path d="M30 50c0-7 5-11 11-11s11 11 18 11 11-4 11-11-5-11-11-11-11 11-18 11-11-4-11-11" fill="none" stroke="#7EE0A2" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </template>

  <div id="fit">
    <div id="app-root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screen-atividades.jsx"></script>
  <script type="text/babel" src="screens-more.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Escala o telemóvel para caber no viewport
    function fitDevice() {
      var fit = document.getElementById('fit');
      var dev = fit.firstElementChild.firstElementChild; // AndroidDevice root
      if (!dev) return;
      var w = dev.offsetWidth || 428, h = dev.offsetHeight || 908;
      var s = Math.min((window.innerWidth - 24) / w, (window.innerHeight - 24) / h, 1.15);
      fit.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fitDevice);
    var fitIv = setInterval(fitDevice, 300);
    setTimeout(function () { clearInterval(fitIv); }, 4000);
  </script>
</body>
</html>
